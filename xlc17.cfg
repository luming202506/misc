#===============================================================================
# Global Options apply to all runs
#===============================================================================
action          = validate
tune            = base,peak # tune -> -T
iterations      = 3 # iterations -> -n
ignore_errors   = 1
mean_anyway     = 1
output_format   = asc,cfg,csv,pdf,rsf
basepeak        = 0
reportable      = 1
allow_label_override = 1
label = clang_default
size            = test,train,ref
teeout          = no # Controls if the log file info is echo'd to the screen
backup_config   = 0 # set to 0 if you do not want backup files
log_line_width  = 150
env_vars        = 1
# Control if the imbedded md5 string of compiler options is checked for
# recompile if the options have changed
%ifdef %{MD5}
check_md5       = 1
%else
check_md5       = 0
%endif

preENV_MALLOCMULTIHEAP=1
preENV_MEMORY_AFFINITY=MCM
preENV_XLFRTEOPTS=intrinthds=1 # Keep fortran runtime to 1 thread for now
preENV_LIBPATH=%{install_path}/tcmalloc

# The -j# option is in the v1.1 FDO options has - if changed will
# cause a rebuild on the next hash check run.  So can not set for
# build and unset for runs.
%ifdef %{MKcpus}
makeflags       = -j%{MKcpus}
%endif
%ifdef %{MKignerr}
makeflags       = -i
%endif

submit = bindprocessor \$\$ $BIND; $system_alloc_override $command

%ifdef %{NO_MASS}
%  define MASSOPT
%  define MASSLINK
%else
%  define MASSOPT -mllvm -enable-ppc-gen-scalar-mass -mllvm -vector-library=MASSV
%  define MASSLINK -Wl,-bplugin_opt:--enable-ppc-gen-scalar-mass
%endif

flagsurl000  = http://www.spec.org/cpu2017/flags/IBM_AIX_7.2_S-RevB.xml
flagsurl001  = http://www.spec.org/cpu2017/flags/IBM_Open_XL_AIX_flags-RevB.xml

#===============================================================================
# How the compilers are called
#===============================================================================

%define WYC "/opt/IBM/openxlC/17.1.0/bin"
%define WYF "/opt/IBM/openxlf/17.1.0/bin"

default:
%if defined(%{CUSTOM_CC}) && defined(%{CUSTOM_CXX})
  CC  = %{CUSTOM_CC}  -m%{bits}
  CXX = %{CUSTOM_CXX}  -m%{bits}
% info C Compiler = %{CUSTOM_CC}
% info C++ Compiler = %{CUSTOM_CXX}
%else
  CC  = %{WYC}/ibm-clang -m%{bits}
  CXX = %{WYC}/ibm-clang++_r -m%{bits}
% info C Compiler = %{WYC}/ibm-clang
% info C++ Compiler = %{WYC}/ibm-clang++_r
%endif

%ifdef %{CUSTOM_FC}
  FC  = %{CUSTOM_FC} -q%{bits}
% info Fortran Compiler = %{CUSTOM_FC}
%else
  FC  = %{WYF}/xlf95_r -q%{bits}
% info Fortran Compiler = %{WYF}/xlf95_r
%endif

default=default=default:
CC_VERSION_OPTION  = --version
CXX_VERSION_OPTION = --version
FC_VERSION_OPTION  = -qversion=verbose

# Use this macro to provide the full path to your private llvm-profdata tool.
%ifndef %{LLVM_PROFDATA}
% define LLVM_PROFDATA %{WYC}/ibm-llvm-profdata
%endif

#===============================================================================
# Base Level Optimizations
#    Limited to any number of flags
#===============================================================================

default=base=default:
%ifdef %{NO_TCMALLOC}
system_alloc_override = MALLOCTYPE=watson2
%else
system_alloc_override = MALLOCTYPE=user:libtcmalloc_minimal.a
%endif

COPTIMIZE   = %{ARCH}  -mabi=vec-extabi %{MASSOPT}
CXXOPTIMIZE = %{ARCH}  -mabi=vec-extabi %{MASSOPT}
FOPTIMIZE   = -O3 -qarch=pwr9 -q%{bits} -qvecnvol %{MASSOPT}
LDCFLAGS   = -Wl,-bbigtoc -Wl,-blpdata
LDCXXFLAGS = -Wl,-bbigtoc -Wl,-blpdata
LDFFLAGS = -bbigtoc -blpdata
%ifndef %{NO_MASS}
  LIBS += -L/opt/IBM/xlmass/10.1.0/lib -lmass -L/opt/IBM/openxlf/17.1.0/lib -lxlopt
%endif

%if defined(%{LTO_BASE})
COPTIMIZE   += -flto -mllvm -data-layout-opt=1
CXXOPTIMIZE += -flto
FOPTIMIZE   += -qlto
LDCFLAGS    += %{MASSLINK} -Wl,-bplugin_opt:--data-layout-opt=1
LDCXXFLAGS  += %{MASSLINK}
%endif

#===============================================================================
# Portability Flags
#     no optimizations allowed here
#===============================================================================
default:
%if %{bits} == 64
EXTRA_PORTABILITY = -DSPEC_LP64
%endif

# INT Portability Flags
500.perlbench_r:
CPORTABILITY    = -DSPEC_AIX

502.gcc_r:
CPORTABILITY   = -DSPEC_AIX -DSPEC_NEED_ASPRINTF

523.xalancbmk_r:
CXXPORTABILITY = -DSPEC_AIX

541.leela_r:
%if %{bits} == 64
CXXPORTABILITY = -DSPEC_AIX
%endif

#======================================================================
# Base Level Optimizations
#======================================================================
intrate=base:
EXTRA_COPTIMIZE    = -O3 -fcommon -mllvm -fold-complex-pointer-compare=false
EXTRA_CXXOPTIMIZE =  -O3
%if %{bits} == 32
LDCFLAGS       += -Wl,-bmaxdata:0xD0000000/dsa
LDCXXFLAGS     += -Wl,-bmaxdata:0x30000000
%endif
EXTRA_LDFLAGS += -Wl,-bplugin_opt:-fold-complex-pointer-compare=false

#======================================================================
# Peak Level Optimizations
#======================================================================

intrate=peak:
COPTIMIZE      = -O3 %{ARCH}  -mabi=vec-extabi -flto %{MASSOPT}
CXXOPTIMIZE    = -O3 %{ARCH}  -mabi=vec-extabi -flto %{MASSOPT}
FOPTIMIZE      = -O3 -qarch=pwr9  -qvecnvol -qlto %{MASSOPT}
LDCFLAGS = %{MASSLINK}
LDCXXFLAGS = %{MASSLINK}
%if %{bits} == 32
  LDCFLAGS       = %{MASSLINK} -Wl,-bmaxdata:0xD0000000/dsa
  LDCXXFLAGS     = %{MASSLINK} -Wl,-bmaxdata:0x30000000
%endif

default=peak:


PASS1_COPTIMIZE   = -fprofile-generate
PASS1_CXXOPTIMIZE = -fprofile-generate
PASS1_FOPTIMIZE   = -qprofile-generate
PASS1_LDCFLAGS   = -Wl,-blpdata -Wl,-bbigtoc
PASS1_LDCXXFLAGS = -Wl,-blpdata -Wl,-bbigtoc
PASS1_LDFFLAGS   = -blpdata -bbigtoc -qlto

fdo_post1         =  %{LLVM_PROFDATA} merge default*.profraw -output default.profdata

PASS2_COPTIMIZE   = -fprofile-use=default.profdata
PASS2_CXXOPTIMIZE = -fprofile-use=default.profdata
PASS2_FOPTIMIZE   = -qprofile-use=default.profdata
PASS2_LDCFLAGS   = -Wl,-blpdata
PASS2_LDCXXFLAGS = -Wl,-blpdata
PASS2_LDFFLAGS   = -blpdata -qlto

%ifndef %{NO_MASS}
  LIBS += -L/opt/IBM/xlmass/10.1.0/lib -lmass -L/opt/IBM/openxlf/17.1.0/lib -lxlopt
%endif

###############################################################################
# Benchmark Specific Peak Optimizations
###############################################################################

500.perlbench_r,502.gcc_r,520.omnetpp_r,523.xalancbmk_r=peak:
EXTRA_PORTABILITY = %undef%
CC  = %{WYC}/ibm-clang -m32
CXX  = %{WYC}/ibm-clang++_r -m32
LDCFLAGS       = %{MASSLINK} -Wl,-bmaxdata:0xD0000000/dsa
LDCXXFLAGS     = %{MASSLINK} -Wl,-bmaxdata:0x30000000

500.perlbench_r=peak:
ENV_MALLOCOPTIONS=pool:0x20000000,buckets,no_mallinfo
EXTRA_COPTIMIZE = -fno-strict-aliasing
LDCFLAGS +=  -Wl,-bplugin_opt:--ppc-set-dscr=1
PASS2_LDFLAGS += -Wl,-bplugin_opt:-inline-hot-callsites-aggressively

502.gcc_r=peak:
EXTRA_COPTIMIZE += -mllvm -fold-complex-pointer-compare=false
copies = %{Copy6}
ENV_MALLOCTYPE=watson2
LDCFLAGS       = %{MASSLINK} -Wl,-bmaxdata:0x50000000
EXTRA_LDFLAGS = -Wl,-bplugin_opt:-fold-complex-pointer-compare=false

505.mcf_r=peak:
ENV_MALLOCTYPE=watson2
EXTRA_COPTIMIZE = -mllvm -data-layout-opt=3
PASS2_LDFLAGS += -Wl,-bplugin_opt:--data-layout-opt=3

520.omnetpp_r=peak:
ENV_MALLOCOPTIONS=pool:0x20000000
LDCXXFLAGS += -Wl,-bplugin_opt:--ppc-set-dscr=1
PASS2_CXXOPTIMIZE += -Wl,-bplugin_opt:-dynamic-cast-opt=on

523.xalancbmk_r=peak:
ENV_MALLOCTYPE=Yorktown
ENV_MALLOCOPTIONS=pool:0x20000000
OPTIMIZE += -mllvm -enable-partial-inlining -mllvm -enable-vec-find=true
PASS2_LDFLAGS += -Wl,-bplugin_opt:-inline-hot-callsites-aggressively -Wl,-bplugin_opt:-enable-partial-inlining

525.x264_r=peak:
ENV_MALLOCTYPE=watson2
EXTRA_COPTIMIZE = -fcommon  -frestrict-args -mllvm -enable-aggressive-vectorization -mllvm -ppc-enable-redxnintr
PASS2_LDCFLAGS += -Wl,-bplugin_opt:-enable-aggressive-vectorization

531.deepsjeng_r=peak:
ENV_MALLOCTYPE=watson2
LDFLAGS +=  -Wl,-bplugin_opt:--ppc-set-dscr=1
PASS2_LDFLAGS += -Wl,-bplugin_opt:-inline-hot-callsites-aggressively

541.leela_r=peak:
ENV_MALLOCTYPE=watson2
OPTIMIZE += -mllvm -aggressive-late-full-unroll -mllvm -array-compress=true -mllvm -enable-lvi-memoryssa=true
PASS2_LDFLAGS += -Wl,-bplugin_opt:-inline-hot-callsites-aggressively

548.exchange2_r=peak:
ENV_MALLOCTYPE=watson2
LDFFLAGS += -Wl,-bplugin_opt:--ppc-set-dscr=1

557.xz_r=peak:
basepeak=yes


